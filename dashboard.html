<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./dashboard.css">
</head>
<body class="admin-body">
    <div id="dashboard-container" class="portfolio-wrapper dashboard-hidden">
        <aside class="sidebar">
            <a href="./index.html" class="sidebar-item" style="text-decoration: none;">View Site</a>
            <span class="sidebar-item" id="logout-btn">Logout</span>
        </aside>

        <main class="main-content">
            <section class="profile-card">
                <div class="about-me-tag">Profile Edit</div>
                
                <div class="edit-group">
                    <label>Profile Image URL (Backblaze B2)</label>
                    <input type="text" id="edit-portrait-url" placeholder="URL">
                </div>

                <div class="edit-group">
                    <label>Full Name (Use \n for line breaks)</label>
                    <textarea id="edit-name" rows="3"></textarea>
                </div>

                <div class="edit-group">
                    <label>Email Address</label>
                    <input type="email" id="edit-email">
                </div>
                
                <button class="save-btn" id="save-profile">Save Profile</button>
            </section>

            <section class="bento-grid">
                <div class="header-row">
                    <div class="input-group">
                    <label>Portfolio Title</label>
                    <input type="text" id="edit-title" placeholder="Portfolio">
                </div>
                <div class="input-group">
                    <label>Engagement Stats</label>
                    <input type="text" id="edit-engagement" placeholder="2.4M+">
                </div>
                <div class="input-group">
                    <label>Tools / Tech Stack (comma separated)</label>
                    <input type="text" id="edit-tools" placeholder="Figma, Ps, Ai, Ae">
                </div>
            </div>

            <div class="input-section">
                <h3>Card Customization</h3>
                <div class="input-group">
                    <label>Experience Label</label>
                    <input type="text" id="edit-experience-label" placeholder="Years of Experience">
                </div>
                <div class="input-group">
                    <label>Global Awards Label</label>
                    <input type="text" id="edit-awards-label" placeholder="Global Design Awards">
                </div>
                <div class="input-group">
                    <label>Client Label</label>
                    <input type="text" id="edit-client-label" placeholder="Clients">
                </div>
                <div class="input-group">
                    <label>Client Logo (Text/Emoji)</label>
                    <input type="text" id="edit-client-logo" placeholder="">
                </div>
            </div>

            <div class="input-section">
                <h3>Metrics</h3>
                <div class="grid-2">
                    <div class="input-group">
                        <label>Projects</label>
                        <input type="text" id="edit-projects">
                    </div>
                    <div class="input-group">
                        <label>Awards</label>
                        <input type="text" id="edit-awards">
                    </div>
                    <div class="input-group">
                        <label>Global Awards</label>
                        <input type="text" id="edit-global-awards">
                    </div>
                    <div class="input-group">
                        <label>Experience Years</label>
                        <input type="text" id="edit-experience">
                    </div>
                </div>
            </div>

                <div class="video-card edit-mode">
                    <label>Video/Image URL</label>
                    <input type="text" id="edit-video-url" class="dash-input">
                </div>

                <div class="sphere-card edit-mode">
                    <label>3D Sphere URL</label>
                    <input type="text" id="edit-sphere-url" class="dash-input">
                </div>
            </section>
        </main>
        
        <div class="dashboard-footer">
            <button id="save-all" class="save-btn">Update All Content</button>
        </div>
    </div>

    <script type="module" src="./dashboard.js"></script>
</body>
</html>

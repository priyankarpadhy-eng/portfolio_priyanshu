<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Studio</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .gallery-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }
        .gallery-header h1 {
            font-size: 3rem;
            color: var(--primary-purple);
        }
        .gallery-header h1 span {
            color: var(--primary-pink);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            grid-auto-rows: 300px;
        }
        .art-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .art-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.2);
        }
        .art-card:nth-child(3n) { grid-row: span 2; }
        .art-card:nth-child(4n) { grid-column: span 2; }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .art-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .art-card:hover .art-info {
            transform: translateY(0);
        }
        .back-btn {
            padding: 12px 25px;
            background: var(--primary-purple);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: var(--primary-pink);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-auto-rows: 250px;
                grid-template-columns: 1fr 1fr;
            }
            .art-card:nth-child(4n) { grid-column: span 1; }
            .gallery-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body class="bg-gradient">
    <div class="gallery-container">
        <header class="gallery-header">
            <h1>The <span>Art Gallery</span></h1>
            <a href="./index.html" class="back-btn">← Back Home</a>
        </header>

        <div class="gallery-grid" id="gallery-grid">
            <!-- Artworks injected here -->
            <div class="loading-state" style="color: var(--primary-purple); font-weight: 700;">Loading masterpieces...</div>
        </div>
    </div>

    <script type="module">
        import { db, collection, query, orderBy, onSnapshot } from './firebase-config.js';

        const grid = document.getElementById('gallery-grid');

        onSnapshot(query(collection(db, "artworks"), orderBy("createdAt", "desc")), (snapshot) => {
            grid.innerHTML = '';
            if (snapshot.empty) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; font-size: 1.2rem;">No artworks showcased yet. Add some from the dashboard!</p>';
                return;
            }
            snapshot.forEach(doc => {
                const art = doc.data();
                const card = document.createElement('div');
                card.className = 'art-card';
                card.innerHTML = `
                    <img src="${art.imageUrl}" alt="${art.title}">
                    <div class="art-info">
                        <h3>${art.title || 'Untitled'}</h3>
                        <p>${art.description || 'Premium Drawing'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>

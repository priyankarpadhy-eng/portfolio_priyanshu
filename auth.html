<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Portfolio</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./dashboard.css">
    <style>
        .auth-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
        }
        
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 102, 196, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            border: 4px solid white;
        }

        .auth-tabs {
            display: flex;
            background: #f0f0f0;
            border-radius: 15px;
            margin-bottom: 30px;
            padding: 5px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 700;
            transition: var(--transition);
            color: #666;
        }

        .auth-tab.active {
            background: white;
            color: var(--primary-purple);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .auth-input:focus {
            border-color: var(--primary-purple);
        }

        .auth-btn {
            background: var(--primary-purple);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: var(--transition);
        }

        .auth-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--primary-purple);
        }

        .hidden { display: none; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2 id="auth-title" style="margin-bottom: 20px; color: var(--primary-purple);">Welcome Back!</h2>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login">Login</div>
            <div class="auth-tab" id="tab-signup">Sign Up</div>
        </div>

        <form class="auth-form" id="auth-form">
            <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <div style="text-align: right; margin-top: -10px;">
                <a href="#" id="forgot-password" class="back-link" style="margin: 0; font-size: 0.8rem;">Forgot Password?</a>
            </div>
            <button type="submit" class="auth-btn" id="submit-btn">Login</button>
        </form>

        <p id="auth-message" style="margin-top: 15px; font-size: 0.9rem; color: #666; display: none;"></p>

        <a href="./index.html" class="back-link">← Back to Portfolio</a>
    </div>

    <script type="module">
        import { 
            auth, signInWithEmailAndPassword, 
            sendEmailVerification, sendPasswordResetEmail 
        } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const authTitle = document.getElementById('auth-title');
        const submitBtn = document.getElementById('submit-btn');
        const authForm = document.getElementById('auth-form');
        const authMessage = document.getElementById('auth-message');
        const forgotPassword = document.getElementById('forgot-password');
        
        let isLogin = true;

        tabLogin.onclick = () => {
            isLogin = true;
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            authTitle.textContent = "Welcome Back!";
            submitBtn.textContent = "Login";
            forgotPassword.style.display = "block";
        };

        tabSignup.onclick = () => {
            isLogin = false;
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            authTitle.textContent = "Create Account";
            submitBtn.textContent = "Sign Up";
            forgotPassword.style.display = "none";
        };

        forgotPassword.onclick = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                alert("Please enter your email address first.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Password reset email sent! Check your inbox.");
            } catch (err) {
                alert(err.message);
            }
        };

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = "Processing...";
            authMessage.style.display = "none";

            try {
                if (isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    if (!userCredential.user.emailVerified) {
                        authMessage.textContent = "Please verify your email before logging in. Check your inbox!";
                        authMessage.style.color = "#d63031";
                        authMessage.style.display = "block";
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Login";
                        return;
                    }
                    window.location.href = './dashboard.html';
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCredential.user);
                    authMessage.textContent = "Registration successful! A verification email has been sent. Please verify to login.";
                    authMessage.style.color = "#00b894";
                    authMessage.style.display = "block";
                    submitBtn.textContent = "Sign Up";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                alert(err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? "Login" : "Sign Up";
            }
        };
    </script>

</body>
</html>
